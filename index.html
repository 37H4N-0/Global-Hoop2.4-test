<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL HOOPS // PERFORMANCE ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        :root {
            --white: #ffffff; --black: #000000; --accent: #ff4d00;
            --grey-light: #f6f6f6; --border: #e5e5e5; --success: #00ff88;
        }

        body.dark-theme { --white: #0a0a0a; --black: #ffffff; --grey-light: #1a1a1a; --border: #333333; }

        body { margin: 0; background-color: var(--white); color: var(--black); font-family: 'Inter', sans-serif; text-transform: uppercase; transition: background 0.3s; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* Navigation */
        .main-nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: var(--white); border-bottom: 1px solid var(--border);
            z-index: 1000; box-sizing: border-box;
        }
        .nav-logo { font-weight: 900; font-size: 1.5rem; cursor: pointer; letter-spacing: -2px; }
        .nav-links button { 
            background: none; border: none; font-family: inherit; font-weight: 900; 
            margin-left: 20px; cursor: pointer; color: var(--black); font-size: 0.7rem;
        }

        /* Page System */
        .page { display: none; opacity: 0; transition: opacity 0.5s ease; padding-top: 70px; min-height: 100vh; }
        .page.active { display: block; opacity: 1; }

        /* Hero Landing */
        .hero-section { background: #000; color: #fff; min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 40px 5%; overflow: hidden; }
        .hero-content { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; max-width: 1200px; width: 100%; }
        .hero-text h2 { font-size: clamp(2.5rem, 8vw, 6rem); margin: 10px 0; line-height: 0.8; font-weight: 900; }
        .hero-img img { width: 120%; transform: rotate(-10deg); filter: drop-shadow(0 20px 50px rgba(255,255,255,0.2)); }

        .cta-bar { height: 15vh; display: flex; align-items: center; justify-content: center; background: var(--black); }
        .explore-btn { background: transparent; color: white; border: 2px solid white; padding: 15px 40px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .explore-btn:hover { background: white; color: black; }

        /* Header & Content */
        #main-header { padding: 40px 5%; border-bottom: 2px solid var(--black); }
        .main-logo { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; letter-spacing: -4px; margin: 0; line-height: 1; }
        .header-controls { display: flex; gap: 10px; margin-top: 20px; }
        #search-bar { flex-grow: 1; background: var(--grey-light); border: 1px solid var(--border); color: var(--black); padding: 12px; font-size: 0.7rem; outline: none; }

        .content-container { padding: 40px 5% 120px; }
        .shoe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        
        /* Cards */
        .shoe-card { cursor: pointer; position: relative; transition: transform 0.3s; }
        .image-container { background: var(--grey-light); height: 320px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 4px; position: relative;}
        .image-container img { width: 85%; transition: 0.5s ease; pointer-events: none; }
        .shoe-card:hover img { transform: scale(1.1) rotate(-5deg); }

        .fav-btn, .comp-btn {
            position: absolute; top: 15px; background: white; border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .fav-btn { left: 15px; color: #ff0000; }
        .comp-btn { right: 15px; font-size: 0.7rem; }
        .fav-btn.active { background: var(--accent); color: white; }
        .comp-btn.active { background: var(--black); color: white; }

        .line-tag { color: var(--accent); font-size: 0.6rem; font-weight: 900; margin-bottom: 5px; display: block; }
        .shoe-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }

        /* Compare Tray Dock */
        .compare-tray {
            position: fixed; bottom: -100px; left: 0; width: 100%; height: 80px;
            background: var(--black); color: white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .compare-tray.active { bottom: 0; }
        .compare-slots { display: flex; gap: 10px; margin-right: 20px; }
        .slot-img { width: 50px; height: 50px; background: #222; border-radius: 4px; overflow: hidden; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--white); z-index: 9999; overflow-y: auto; }
        .modal-window { max-width: 1000px; margin: 0 auto; padding: 120px 5% 60px; }
        .modal-close { position: fixed; top: 20px; left: 5%; background: var(--black); color: var(--white); border: none; padding: 12px 24px; font-weight: 900; cursor: pointer; z-index: 10001; }
        .modal-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 60px; }
        
        /* Comparison Layout */
        .compare-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: var(--border); border: 2px solid var(--border); }
        .compare-col { background: var(--white); padding: 40px; text-align: center; }
        .compare-col img { width: 100%; max-width: 300px; }
        .compare-row { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .compare-label { font-weight: 900; color: var(--accent); margin-bottom: 5px; }

        @media (max-width: 768px) {
            .hero-content { grid-template-columns: 1fr; text-align: center; }
            .hero-img { order: -1; }
            .compare-grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <nav class="main-nav">
        <div class="nav-logo" onclick="showPage('home')">GH // PERFORMANCE</div>
        <div class="nav-links">
            <button onclick="showPage('home')">HOME</button>
            <button onclick="showPage('collection')">COLLECTION</button>
            <button onclick="showPage('locker')">LOCKER (<span id="locker-count">0</span>)</button>
            <button id="theme-toggle">DARK</button>
        </div>
    </nav>

    <section id="page-home" class="page active">
        <div id="featured-hero" class="hero-section"></div>
        <div class="cta-bar">
            <button class="explore-btn" onclick="showPage('collection')">EXPLORE THE ARCHIVE ↓</button>
        </div>
    </section>

    <section id="page-collection" class="page">
        <header id="main-header">
            <h1 class="main-logo">SIGNATURE<br>LINES</h1>
            <div class="header-controls">
                <input type="text" id="search-bar" placeholder="SEARCH PLAYER, TECH, OR BRAND..." oninput="renderShoes()">
            </div>
        </header>
        <main class="content-container">
            <div id="archive-grid" class="shoe-grid"></div>
        </main>
    </section>

    <section id="page-locker" class="page">
        <header id="main-header">
            <h1 class="main-logo">MY LOCKER</h1>
            <p style="padding: 0 5%; color: var(--accent); font-weight: 900;">YOUR SAVED ROTATION</p>
        </header>
        <main class="content-container">
            <div id="locker-grid" class="shoe-grid"></div>
        </main>
    </section>

    <div id="compare-tray" class="compare-tray">
        <div class="compare-slots" id="compare-slots"></div>
        <button class="explore-btn" style="font-size: 0.6rem; padding: 10px;" onclick="openCompareModal()">COMPARE VS</button>
        <button onclick="compareList=[]; updateCompareTray(); renderShoes();" style="background:none; border:none; color:grey; cursor:pointer; margin-left:10px; font-weight: 900;">CLEAR</button>
    </div>

    <div id="modal" class="modal-overlay">
        <button class="modal-close" onclick="closeModal()">← BACK</button>
        <div class="modal-window"><div id="modal-body" class="modal-layout"></div></div>
    </div>

    <div id="compare-modal" class="modal-overlay">
        <button class="modal-close" onclick="closeCompareModal()">← CLOSE VS</button>
        <div class="modal-window">
            <h2 style="text-align: center; font-size: 3rem; margin-bottom: 40px;">HEAD TO HEAD</h2>
            <div id="compare-results" class="compare-grid-layout"></div>
        </div>
    </div>
</div>

<script>
    const shoeDatabase = [
        { id: 1, brand: "NIKE", line: "LEBRON SERIES", name: "LeBron 21 'Dragon'", price: 200, hype: 5, tech: "Air Zoom + Cushlon", img: "https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/0329433d-c019-4822-8b4e-28268c15985b/lebron-xxi-basketball-shoes-SPh6ms.png" },
        { id: 2, brand: "ADIDAS", line: "ANTHONY EDWARDS", name: "AE1 'Velocity'", price: 120, hype: 5, tech: "Jet Boost Foam", img: "https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/7f6517a618e04099a43e49e061c27df6_9366/AE_1_Velocity_Blue_Shoes_Blue_IF1864_01_standard.jpg" },
        { id: 3, brand: "JORDAN", line: "LUKA DONCIC", name: "Luka 3 'Midnight'", price: 130, hype: 4, tech: "IsoPlate Support", img: "https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/609426f3-8f0c-4e5a-8b38-d7a8d9a4242d/luka-2-basketball-shoes-v4V9L6.png" },
        { id: 4, brand: "PUMA", line: "LAMELO BALL", name: "MB.03 'Spark'", price: 125, hype: 5, tech: "Nitro Infused", img: "https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:f3f3f3,w_600,h_600/global/309851/01/sv01/fnd/PNA/fmt/png/MB.03-Blue-Hive-Basketball-Shoes" },
        { id: 5, brand: "LI-NING", line: "WAY OF WADE", name: "WoW 11 'White Hot'", price: 225, hype: 5, tech: "Full-length Boom", img: "https://www.wayofwade.com/cdn/shop/files/1_2989c79e-4e5d-4c81-998a-2c4033c5e8d5_800x.png" },
        { id: 6, brand: "ANTA", line: "KYRIE IRVING", name: "Kai 1 'Speed'", price: 125, hype: 5, tech: "NitroEdge Foam", img: "https://images.complex.com/complex/images/c_fill,f_auto,g_center,w_1200/fl_lossy,pg_1/v9qjvz6j8f5m7k4n5o9d/anta-kai-1-artist-on-court" },
        { id: 7, brand: "UNDER ARMOUR", line: "CURRY BRAND", name: "Curry 12 'Dub'", price: 160, hype: 4, tech: "UA Flow Traction", img: "https://underarmour.scene7.com/is/image/UnderArmour/3026620-100_DEFAULT?wid=566&hei=708" },
        { id: 8, brand: "NEW BALANCE", line: "TYRESE MAXEY", name: "Two Wxy V5", price: 120, hype: 3, tech: "FuelCell + FreshFoam", img: "https://nb.scene7.com/is/image/NB/bb2wxygb_nb_02_i?$pdp_main_v4_lg$&wid=700&hei=700" }
    ];

    let locker = JSON.parse(localStorage.getItem('ghLocker')) || [];
    let compareList = [];

    // NAVIGATION
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        window.scrollTo(0,0);
        if (pageId === 'collection') renderShoes();
        if (pageId === 'locker') renderLocker();
    }

    // LOCKER LOGIC
    function toggleLocker(id, e) {
        e.stopPropagation();
        const idx = locker.indexOf(id);
        idx > -1 ? locker.splice(idx, 1) : locker.push(id);
        localStorage.setItem('ghLocker', JSON.stringify(locker));
        updateLockerCount();
        renderShoes();
        renderLocker();
    }

    function updateLockerCount() {
        document.getElementById('locker-count').innerText = locker.length;
    }

    // COMPARE LOGIC
    function toggleCompare(id, e) {
        e.stopPropagation();
        const idx = compareList.indexOf(id);
        if (idx > -1) {
            compareList.splice(idx, 1);
        } else if (compareList.length < 2) {
            compareList.push(id);
        } else {
            alert("COMPARE LIMIT: 2 MODELS");
            return;
        }
        updateCompareTray();
        renderShoes();
        renderLocker();
    }

    function updateCompareTray() {
        const tray = document.getElementById('compare-tray');
        const slots = document.getElementById('compare-slots');
        tray.classList.toggle('active', compareList.length > 0);
        slots.innerHTML = compareList.map(id => {
            const s = shoeDatabase.find(x => x.id === id);
            return `<div class="slot-img"><img src="${s.img}" width="100%"></div>`;
        }).join('');
    }

    // RENDERING
    function createCard(shoe) {
        const isFav = locker.includes(shoe.id);
        const isComp = compareList.includes(shoe.id);
        const card = document.createElement('div');
        card.className = 'shoe-card';
        card.onclick = () => openModal(shoe);
        card.innerHTML = `
            <div class="image-container">
                <button class="fav-btn ${isFav?'active':''}" onclick="toggleLocker(${shoe.id},event)">${isFav?'♥':'♡'}</button>
                <button class="comp-btn ${isComp?'active':''}" onclick="toggleCompare(${shoe.id},event)">VS</button>
                <img src="${shoe.img}">
            </div>
            <span class="line-tag">${shoe.brand} // ${shoe.line}</span>
            <div class="shoe-name">${shoe.name}</div>
            <div style="font-size:0.8rem; opacity:0.6; font-weight:900;">$${shoe.price} // ${"🔥".repeat(shoe.hype)}</div>
        `;
        return card;
    }

    function renderShoes() {
        const grid = document.getElementById('archive-grid');
        const query = document.getElementById('search-bar').value.toLowerCase();
        grid.innerHTML = '';
        shoeDatabase.filter(s => s.name.toLowerCase().includes(query) || s.brand.toLowerCase().includes(query) || s.line.toLowerCase().includes(query))
                    .forEach(s => grid.appendChild(createCard(s)));
    }

    function renderLocker() {
        const grid = document.getElementById('locker-grid');
        grid.innerHTML = '';
        const saved = shoeDatabase.filter(s => locker.includes(s.id));
        if (saved.length) {
            saved.forEach(s => grid.appendChild(createCard(s)));
        } else {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 100px 0; opacity: 0.5;">YOUR LOCKER IS EMPTY. HEART SOME HEAT TO SAVE IT HERE.</div>';
        }
    }

    // MODALS
    function openModal(shoe) {
        document.getElementById('modal-body').innerHTML = `
            <div style="background:var(--grey-light); border-radius:8px; padding:40px; display:flex; align-items:center;">
                <img src="${shoe.img}" width="100%">
            </div>
            <div>
                <p style="color:var(--accent); font-weight:900; letter-spacing:2px;">${shoe.line}</p>
                <h2 style="font-size:3rem; margin:10px 0; letter-spacing:-2px;">${shoe.name}</h2>
                <p style="text-transform:none; line-height:1.6; color:#666; font-size:1.1rem;">Elite performance silhouette engineered for the 2026 season. Featuring ${shoe.tech} for maximum impact protection and lateral stability.</p>
                <div style="border-top:1px solid var(--border); margin-top:30px; padding-top:30px;">
                    <p><strong>MSRP:</strong> $${shoe.price}</p>
                    <p><strong>CUSHIONING:</strong> ${shoe.tech}</p>
                    <p><strong>HYPE SCORE:</strong> ${"🔥".repeat(shoe.hype)}</p>
                </div>
                <button class="buy-btn" onclick="closeModal()">BACK TO ARCHIVE</button>
            </div>
        `;
        document.getElementById('modal').style.display = 'block';
        document.body.classList.add('modal-open');
    }

    function openCompareModal() {
        if(compareList.length < 2) {
            alert("SELECT 2 SHOES TO COMPARE");
            return;
        }
        const [s1, s2] = compareList.map(id => shoeDatabase.find(x => x.id === id));
        document.getElementById('compare-results').innerHTML = [s1, s2].map(s => `
            <div class="compare-col">
                <img src="${s.img}">
                <div class="compare-row"><div class="compare-label">BRAND</div>${s.brand}</div>
                <div class="compare-row"><div class="compare-label">LINE</div>${s.line}</div>
                <div class="compare-row"><div class="compare-label">CUSHIONING</div>${s.tech}</div>
                <div class="compare-row"><div class="compare-label">RETAIL</div>$${s.price}</div>
                <div class="compare-row"><div class="compare-label">HYPE</div>${"🔥".repeat(s.hype)}</div>
            </div>
        `).join('');
        document.getElementById('compare-modal').style.display = 'block';
        document.body.classList.add('modal-open');
    }

    // INIT
    function initHero() {
        const shoe = shoeDatabase[Math.floor(Math.random()*shoeDatabase.length)];
        document.getElementById('featured-hero').innerHTML = `
            <div class="hero-content">
                <div class="hero-text"><h3>FEATURED PERFORMANCE</h3><h2>${shoe.name}</h2><button class="explore-btn" style="background:white; color:black;" onclick="showPage('collection')">VIEW ARCHIVE</button></div>
                <div class="hero-img"><img src="${shoe.img}"></div>
            </div>
        `;
    }

    function closeModal() { 
        document.getElementById('modal').style.display = 'none'; 
        document.body.classList.remove('modal-open');
    }
    function closeCompareModal() { 
        document.getElementById('compare-modal').style.display = 'none'; 
        document.body.classList.remove('modal-open');
    }

    document.getElementById('theme-toggle').onclick = () => {
        document.body.classList.toggle('dark-theme');
        document.getElementById('theme-toggle').innerText = document.body.classList.contains('dark-theme') ? 'LIGHT' : 'DARK';
    };

    updateLockerCount();
    initHero();
</script>
</body>
</html>
